      allowed_tools: [finance.read, finance.write_draft, invoices.generate_draft, payments.read, reporting.generate, state.read, state.write, approval.request, audit.log]
      approval_gated_tools: [finance.write_draft, invoices.generate_draft]
      notes: Internal finance operations profile for billing, forecasting, and receivables support.

    - id: ops-vendor-admin
      allowed_tools: [vendors.read, vendors.write, finance.read, hr.read, hr.write_limited, docs.read, docs.write, state.read, state.write, approval.request, audit.log]
