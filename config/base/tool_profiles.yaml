tool_profiles:
  profiles:
    - id: email-internal
      allowed_tools: [email.read, email.draft, memory.search, state.read, state.write, approval.request, audit.log]
      approval_gated_tools: [email.send_external]
      notes: Email drafting and approval preparation for internal operator workflows.

    - id: personal-assistant-internal
      allowed_tools: [email.read, calendar.read, memory.search, state.read, reporting.generate, audit.log]
      approval_gated_tools: [calendar.write, email.send_external]
      notes: Read-heavy daily coordination profile for the CEO assistant.

    - id: growth-intake
      allowed_tools: [email.read, crm.read, crm.write, contacts.read, state.read, state.write, audit.log]
      approval_gated_tools: [crm.write]
      notes: Lead capture and CRM structuring for growth intake.

    - id: growth-research
      allowed_tools: [crm.read, contacts.read, research.web_search, memory.search, state.read, audit.log]
      notes: Research and enrichment profile without outbound action rights.

    - id: growth-qualification
      allowed_tools: [crm.read, crm.write, pricing.read_rules, state.read, state.write, audit.log]
      approval_gated_tools: [crm.write]
      notes: Qualification profile for fit scoring and next-step routing.

    - id: growth-outreach
      allowed_tools: [email.read, email.draft, crm.read, crm.write, contacts.read, state.read, state.write, approval.request, audit.log]
      approval_gated_tools: [email.send_external, crm.write]
      notes: Outreach drafting profile with approval-gated outbound commitments.

    - id: growth-proposal
      allowed_tools: [proposals.read_template, pricing.read_rules, pricing.run_estimate, docs.read, docs.write, state.read, state.write, approval.request, audit.log]
      approval_gated_tools: [docs.write]
      notes: Proposal and SOW preparation profile with pricing and document-authoring access.

    - id: delivery-governance-internal
      allowed_tools: [pm.read, pm.write, tasks.read, tasks.write, docs.read, docs.write, finance.read, reporting.generate, state.read, state.write, approval.request, audit.log]
      approval_gated_tools: [pm.write, docs.write]
      notes: Internal PMO profile with delivery governance and company-level finance visibility.

    - id: delivery-governance-client
      allowed_tools: [pm.read, pm.write, tasks.read, tasks.write, docs.read, docs.write, reporting.generate, state.read, state.write, approval.request, audit.log]
      approval_gated_tools: [pm.write, docs.write]
      notes: Client-delivery PMO profile without company finance visibility.

    - id: delivery-coordination
      allowed_tools: [pm.read, tasks.read, tasks.write, docs.read, docs.write, calendar.read, state.read, state.write, approval.request, audit.log]
      approval_gated_tools: [tasks.write, docs.write, calendar.write]
      notes: Execution-follow-up profile for delivery coordination and checkpoints.

    - id: delivery-analysis
      allowed_tools: [meetings.ingest_transcript, docs.read, docs.write, pm.read, state.read, state.write, memory.search, approval.request, audit.log]
      approval_gated_tools: [docs.write]
      notes: Requirements and architecture analysis profile for delivery specialists.

    - id: delivery-build
      allowed_tools: [repo.read, repo.write, docs.read, docs.write, code.run_sandbox, state.read, state.write, approval.request, audit.log]
      approval_gated_tools: [repo.write, workflow.deploy_nonprod]
      notes: Implementation profile for build and automation work with approval-gated writes and deployments.

    - id: delivery-qa
      allowed_tools: [docs.read, pm.read, tasks.read, repo.read, reporting.generate, state.read, approval.request, audit.log]
      notes: Validation and release-readiness profile for QA and quality review roles.

    - id: delivery-documentation
      allowed_tools: [docs.read, docs.write, pm.read, tasks.read, state.read, state.write, approval.request, audit.log]
      approval_gated_tools: [docs.write]
      notes: Documentation and handover packaging profile for delivery teams.

