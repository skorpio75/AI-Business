      notes: Internal vendor, procurement, admin, and HR operations profile.

    - id: ops-reporting-internal
      allowed_tools: [crm.read, pm.read, finance.read, reporting.generate, memory.search, state.read, audit.log]
      notes: Internal company reporting profile across growth, delivery, and finance inputs.

    - id: ops-reporting-client
      allowed_tools: [pm.read, reporting.generate, memory.search, state.read, audit.log]
      notes: Client reporting profile constrained to delivery-side context.

    - id: executive-briefing
